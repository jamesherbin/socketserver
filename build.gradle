plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.3'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.mainst'
version = '0.0.1-SNAPSHOT'
description = 'Web Socket Server'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-websocket'
	implementation 'org.springframework:spring-context:7.0.6'
	implementation 'com.google.cloud:google-cloud-storage:2.64.0'
	implementation 'com.google.cloud:spring-cloud-gcp-core:8.0.1'
	testImplementation 'org.springframework.boot:spring-boot-starter-websocket-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

bootBuildImage {
    imageName = "msc/${project.name}:${project.version}"
    environment = ["BP_JVM_VERSION":"17.*"]
}

tasks.named('test') {
	useJUnitPlatform()
}
